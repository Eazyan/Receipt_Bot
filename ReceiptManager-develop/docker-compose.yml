version: "3.8"

services:

  db-service:
    build: ./apps/db-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    ports:
      - ${DB_SERVICE_HOST_PORT:-18000}:${DB_SERVICE_PORT:-8000}

  redis:
    image: redis:7-alpine
    ports:
      - ${REDIS_HOST_PORT:-16379}:6379
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - ./pg_data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_HOST_PORT:-15432}:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-checkpointer:
    image: postgres:15
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${LANGGRAPH_RECEIPT_DB_USER}
      - POSTGRES_PASSWORD=${LANGGRAPH_RECEIPT_DB_PASSWORD}
      - POSTGRES_DB=${LANGGRAPH_RECEIPT_DB_NAME}
    volumes:
      - ./checkpointer_receipt_data:/var/lib/postgresql/data
    ports:
      - ${LANGGRAPH_RECEIPT_DB_PORT_EXTERNAL:-15433}:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${LANGGRAPH_RECEIPT_DB_USER} -d ${LANGGRAPH_RECEIPT_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  postgres-room-checkpointer:
    image: postgres:15
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${LANGGRAPH_ROOM_DB_USER}
      - POSTGRES_PASSWORD=${LANGGRAPH_ROOM_DB_PASSWORD}
      - POSTGRES_DB=${LANGGRAPH_ROOM_DB_NAME}
    volumes:
      - ./checkpointer_room_data:/var/lib/postgresql/data
    ports:
      - ${LANGGRAPH_ROOM_DB_PORT_EXTERNAL:-15434}:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${LANGGRAPH_ROOM_DB_USER} -d ${LANGGRAPH_ROOM_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s


  executor-service:
    build: ./apps/executor-service
    env_file:
      - .env
    ports:
      - ${EXEC_SERVICE_HOST_PORT:-18002}:${EXEC_SERVICE_PORT:-8002}
    volumes:
      - ./apps/executor-service/app:/app/app
    depends_on:
      postgres-checkpointer:
        condition: service_healthy
      postgres-room-checkpointer:
        condition: service_healthy
      asr-service:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${EXEC_SERVICE_PORT}/health', timeout=5)\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  asr-service:
    build: ./apps/asr-service
    env_file:
      - .env
    ports:
      - ${ASR_SERVICE_HOST_PORT:-15030}:5030
    environment:
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      ASR_MODEL: "${ASR_MODEL:-openai/gpt-4o-transcribe}"
      ASR_FALLBACK_MODELS: "${ASR_FALLBACK_MODELS:-google/chirp-3,openai/gpt-4o-mini-transcribe,mistralai/voxtral-mini-transcribe,openai/whisper-large-v3}"
      ASR_LANGUAGE: "${ASR_LANGUAGE:-ru}"
      ASR_PROMPT: "${ASR_PROMPT:-Это голосовая команда для Telegram Mini App разделения чека. Распознавай названия продуктов и имена участников на русском. Примеры команд: апельсины мне, кофе Маше, салат пополам, всё поровну. Верни только текст команды.}"
      ASR_TIMEOUT: "${ASR_TIMEOUT:-15}"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5030/health', timeout=5)\"" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
